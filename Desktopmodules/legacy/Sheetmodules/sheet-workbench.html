<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCP SheetAI</title>
    <link rel="stylesheet" href="sheet-workbench.css">
</head>
<body>
    <div class="sheet-shell">
        <header class="sheet-header">
            <div>
                <div class="eyebrow">VCP OfficeAI</div>
                <h1>SheetAI</h1>
                <p class="subtitle">面向个人工作系统的 AI 表格工作台</p>
            </div>
            <div class="status-card">
                <span class="status-label">状态</span>
                <strong id="sheetStatus">正在初始化</strong>
            </div>
        </header>

        <main class="sheet-layout">
            <aside class="sidebar-card">
                <div class="card-title-row">
                    <h2>工作簿</h2>
                    <div class="toolbar-actions">
                        <button id="refreshWorkbooksBtn" type="button" class="secondary-btn">刷新</button>
                        <button id="createWorkbookBtn" type="button">新建</button>
                    </div>
                </div>
                <p class="panel-hint">工作簿先作为个人资产保存，后续再接版本快照与 AI 分析。</p>
                <ul id="workbookList" class="workbook-list">
                    <li class="placeholder-item workbook-empty">正在加载工作簿...</li>
                </ul>
            </aside>

            <section class="workspace-card">
                <div class="card-title-row">
                    <div class="workspace-head">
                        <h2 id="activeWorkbookTitle">未打开工作簿</h2>
                        <div id="activeWorkbookMeta" class="muted">创建或选择一个工作簿后，会在这里显示元数据。</div>
                    </div>
                    <span class="muted">MVP 预览网格</span>
                </div>
                <div class="grid-placeholder">
                    <div class="formula-bar">fx =SUM(A1:A10)</div>
                    <div class="fake-grid" id="fakeGrid"></div>
                </div>
            </section>

            <aside class="ai-card">
                <div class="card-title-row">
                    <h2>AI 动作</h2>
                </div>
                <div class="action-list">
                    <button type="button">自然语言生成公式</button>
                    <button type="button">清洗当前列</button>
                    <button type="button">总结选中区域</button>
                    <button type="button">生成周报结论</button>
                </div>
                <p class="action-note">
                    当前先把工作簿管理和桌面入口跑通。下一步直接在这里接公式生成、数据清洗和表格摘要。
                </p>
            </aside>
        </main>
    </div>

    <script src="sheet-workbench.js"></script>
</body>
</html>
