name: VCPChat JS Smoke

on:
  workflow_dispatch:
  push:
    paths:
      - 'Desktopmodules/photoStudio/**'
      - 'Desktopmodules/legacy/Groupmodules/groupchat.js'
      - 'Desktopmodules/legacy/Voicechatmodules/**'
      - 'main.js'
      - 'preload.js'
      - 'preloads/chat.js'
      - 'modules/ipc/desktopHandlers.js'
      - 'modules/ipc/desktopRemoteHandlers.js'
      - 'modules/ipc/sheetHandlers.js'
      - 'modules/renderer/**'
      - 'modules/services/photoStudio/**'
      - 'VCPDistributedServer/Plugin/DesktopRemote/desktop-remote.js'
      - 'VCPDistributedServer/Plugin/ScreenPilot/config.env.example'
      - 'VCPDistributedServer/Plugin/WaitingForUrReply/config.env.example'
      - 'scripts/photo-studio-closeout-smoke.js'
      - 'package.json'
      - '.github/workflows/vcpchat_js_smoke.yml'
  pull_request:
    paths:
      - 'Desktopmodules/photoStudio/**'
      - 'Desktopmodules/legacy/Groupmodules/groupchat.js'
      - 'Desktopmodules/legacy/Voicechatmodules/**'
      - 'main.js'
      - 'preload.js'
      - 'preloads/chat.js'
      - 'modules/ipc/desktopHandlers.js'
      - 'modules/ipc/desktopRemoteHandlers.js'
      - 'modules/ipc/sheetHandlers.js'
      - 'modules/renderer/**'
      - 'modules/services/photoStudio/**'
      - 'VCPDistributedServer/Plugin/DesktopRemote/desktop-remote.js'
      - 'VCPDistributedServer/Plugin/ScreenPilot/config.env.example'
      - 'VCPDistributedServer/Plugin/WaitingForUrReply/config.env.example'
      - 'scripts/photo-studio-closeout-smoke.js'
      - 'package.json'
      - '.github/workflows/vcpchat_js_smoke.yml'

jobs:
  js-smoke:
    name: JS syntax and optional Photo Studio smoke
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Syntax check existing files
        shell: pwsh
        run: |
          $files = @(
            'main.js',
            'preload.js',
            'preloads/chat.js',
            'modules/ipc/desktopHandlers.js',
            'modules/ipc/desktopRemoteHandlers.js',
            'modules/ipc/sheetHandlers.js',
            'modules/renderer/contentPipeline.js',
            'VCPDistributedServer/Plugin/DesktopRemote/desktop-remote.js',
            'Desktopmodules/legacy/Groupmodules/groupchat.js',
            'Desktopmodules/legacy/Voicechatmodules/voicechat.js',
            'Desktopmodules/photoStudio/photoStudio.js',
            'Desktopmodules/photoStudio/services/photoStudioEvents.js',
            'Desktopmodules/photoStudio/services/photoStudioState.js',
            'modules/services/photoStudio/PhotoStudioOrchestrator.js',
            'modules/services/photoStudio/actionCatalog.js',
            'modules/services/photoStudio/uiHints.js'
          )

          foreach ($file in $files) {
            if (Test-Path -LiteralPath $file) {
              node --check $file
              if ($LASTEXITCODE -ne 0) {
                throw "Syntax check failed: $file"
              }
            } else {
              Write-Host "skip missing file: $file"
            }
          }

      - name: Check plugin template defaults
        shell: pwsh
        run: |
          $screenPilot = Get-Content 'VCPDistributedServer/Plugin/ScreenPilot/config.env.example' | ForEach-Object { $_.Trim() }
          if ($screenPilot -notcontains 'VISION_API_FORMAT=chat') {
            throw 'ScreenPilot template must use VISION_API_FORMAT=chat'
          }

          $waitingForReply = Get-Content 'VCPDistributedServer/Plugin/WaitingForUrReply/config.env.example' | ForEach-Object { $_.Trim() }
          if ($waitingForReply -notcontains 'DEFAULT_TIMEOUT=1200') {
            throw 'WaitingForUrReply template must keep DEFAULT_TIMEOUT=1200'
          }

      - name: Optional Photo Studio closeout smoke
        shell: pwsh
        run: |
          $toolboxRoot = 'A:\VCP\VCPToolBox-photo-studio-next'
          $registryPath = [System.IO.Path]::Combine($toolboxRoot, 'plugins', 'registry.json')
          $storePath = [System.IO.Path]::Combine($toolboxRoot, 'plugins', 'custom', 'shared', 'photo_studio_data', 'PhotoStudioDataStore.js')

          if ((Test-Path -LiteralPath $registryPath) -and (Test-Path -LiteralPath $storePath)) {
            npm run test:photo-studio --if-present
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } else {
            Write-Host 'skip optional Photo Studio closeout smoke: external Photo Studio toolbox root is not available on this runner'
          }
